<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>FinTrack</ion-title>
    <ion-buttons slot="end">
      <ion-button color="primary" (click)="syncNow()">
        <ion-icon slot="icon-only" name="sync-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <section class="balance-container">
    <ion-card class="balance-card">
      <ion-card-content>
        <span class="label">Balance Total</span>
        <h1 class="amount">$2,450.00</h1>

        <div class="stats-row">
          <div class="stat-item income">
            <ion-icon name="arrow-up-circle"></ion-icon>
            <div>
              <span>Ingresos</span>
              <p>$4,000</p>
            </div>
          </div>
          <div class="stat-item expense">
            <ion-icon name="arrow-down-circle"></ion-icon>
            <div>
              <span>Gastos</span>
              <p>$1,550</p>
            </div>
          </div>
        </div>
      </ion-card-content>
    </ion-card>
  </section>

  <section class="chart-section">
    <h3 class="section-title">Gastos por Categoría</h3>
    <div class="chart-container">
      <canvas id="categoryDonutChart"></canvas>
    </div>
  </section>

  <section class="recent-transactions">
    <div class="section-header">
      <h3 class="section-title">Últimos Movimientos</h3>
      <ion-button fill="clear" size="small" routerLink="/transactions"
        >Ver todo</ion-button
      >
    </div>

    <ion-list lines="none">
      <ion-item class="transaction-item shadow-sm">
        <ion-icon
          slot="start"
          name="fast-food"
          class="category-icon food"
        ></ion-icon>
        <ion-label>
          <h2>Cena Familiar</h2>
          <p>9 Abr 2026</p>
        </ion-label>
        <ion-note slot="end" color="danger" class="amount">- $45.00</ion-note>
      </ion-item>

      <ion-item class="transaction-item shadow-sm">
        <ion-icon
          slot="start"
          name="briefcase"
          class="category-icon work"
        ></ion-icon>
        <ion-label>
          <h2>Salario</h2>
          <p>8 Abr 2026</p>
        </ion-label>
        <ion-note slot="end" color="success" class="amount"
          >+ $2,000.00</ion-note
        >
      </ion-item>
    </ion-list>
  </section>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="primary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
