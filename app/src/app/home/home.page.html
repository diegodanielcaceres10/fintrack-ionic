<ion-header class="app-header">
  <ion-toolbar>
    <ion-title>FinTrack</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear">
        <ion-icon name="settings-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true" class="home-content">
  <!-- Balance Card -->
  <ion-card class="balance-card">
    <ion-card-content>
      <p class="balance-label">Balance del mes</p>
      <h1 class="balance-amount">€0.00</h1>

      <div class="balance-details">
        <div class="income">
          <span class="label">Ingresos</span>
          <span class="amount">€0.00</span>
        </div>

        <div class="expense">
          <span class="label">Gastos</span>
          <span class="amount">€0.00</span>
        </div>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Chart Placeholder -->
  <ion-card class="chart-card">
    <ion-card-header>
      <ion-card-title>Resumen</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <div class="chart-placeholder">
        <ion-icon name="pie-chart-outline"></ion-icon>
        <p>No hay datos suficientes</p>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Transactions -->
  <div class="transactions-section">
    <div class="section-header">
      <h2>Últimas transacciones</h2>
    </div>

    <div class="empty-state">
      <ion-icon name="wallet-outline"></ion-icon>
      <h3>Aún no tienes transacciones</h3>
      <p>Agrega tu primera transacción para comenzar</p>
    </div>
  </div>

  <!-- FAB -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button class="fab-add">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
