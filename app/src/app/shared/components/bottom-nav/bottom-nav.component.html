<nav class="bottom-nav" role="navigation" aria-label="Main navigation">
  <!-- Home -->
  <button
    class="nav-item"
    [class.nav-item--active]="isActive('home')"
    (click)="onTabClick('home')"
    [attr.aria-current]="isActive('home') ? 'page' : null"
    aria-label="Home"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <path
        d="M3 9.5L12 3L21 9.5V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9.5Z"
        fill="currentColor"
      />
    </svg>
    <span class="nav-item__label">Home</span>
    <span
      class="nav-item__dot"
      *ngIf="isActive('home')"
      aria-hidden="true"
    ></span>
  </button>

  <!-- Cards -->
  <button
    class="nav-item"
    [class.nav-item--active]="isActive('cards')"
    (click)="onTabClick('cards')"
    [attr.aria-current]="isActive('cards') ? 'page' : null"
    aria-label="Cards"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <rect
        x="3"
        y="6"
        width="18"
        height="13"
        rx="2"
        stroke="currentColor"
        stroke-width="1.5"
      />
      <path d="M3 10H21" stroke="currentColor" stroke-width="1.5" />
      <circle cx="17" cy="15" r="1.5" fill="currentColor" />
    </svg>
    <span class="nav-item__label">Cards</span>
    <span
      class="nav-item__dot"
      *ngIf="isActive('cards')"
      aria-hidden="true"
    ></span>
  </button>

  <!-- FAB -->
  <button
    class="nav-fab"
    (click)="onFabClick()"
    aria-label="Add new transaction"
  >
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M12 5V19M5 12H19"
        stroke="white"
        stroke-width="2.2"
        stroke-linecap="round"
      />
    </svg>
  </button>

  <!-- Analytics -->
  <button
    class="nav-item"
    [class.nav-item--active]="isActive('analytics')"
    (click)="onTabClick('analytics')"
    [attr.aria-current]="isActive('analytics') ? 'page' : null"
    aria-label="Analytics"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <path
        d="M3 3H10V10H3V3ZM14 3H21V10H14V3ZM3 14H10V21H3V14ZM14 14H21V21H14V14Z"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linejoin="round"
      />
    </svg>
    <span class="nav-item__label">Analytics</span>
    <span
      class="nav-item__dot"
      *ngIf="isActive('analytics')"
      aria-hidden="true"
    ></span>
  </button>

  <!-- Profile -->
  <button
    class="nav-item"
    [class.nav-item--active]="isActive('profile')"
    (click)="onTabClick('profile')"
    [attr.aria-current]="isActive('profile') ? 'page' : null"
    aria-label="Profile"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5" />
      <path
        d="M4 20C4 17 7.58 15 12 15C16.42 15 20 17 20 20"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
      />
    </svg>
    <span class="nav-item__label">Profile</span>
    <span
      class="nav-item__dot"
      *ngIf="isActive('profile')"
      aria-hidden="true"
    ></span>
  </button>
</nav>
