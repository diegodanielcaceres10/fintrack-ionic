<nav class="bottom-nav" role="navigation" aria-label="Main navigation">
  <a
    class="nav-item"
    routerLink="/home"
    routerDirection="root"
    routerLinkActive="nav-item--active"
    [routerLinkActiveOptions]="{ exact: true }"
    [attr.aria-current]="rlaHome.isActive ? 'page' : null"
    #rlaHome="routerLinkActive"
    aria-label="Home"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <path
        d="M3 9.5L12 3L21 9.5V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9.5Z"
        fill="currentColor"
      />
    </svg>
    <span class="nav-item__label">Home</span>
    @if (rlaHome.isActive) {
      <span class="nav-item__dot" aria-hidden="true"></span>
    }
  </a>

  <a
    class="nav-item"
    routerLink="/transactions"
    routerDirection="root"
    routerLinkActive="nav-item--active"
    [routerLinkActiveOptions]="{ exact: true }"
    [attr.aria-current]="rlaTxn.isActive ? 'page' : null"
    #rlaTxn="routerLinkActive"
    aria-label="Transactions"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <rect
        x="3"
        y="6"
        width="18"
        height="13"
        rx="2"
        stroke="currentColor"
        stroke-width="1.5"
      />
      <path d="M3 10H21" stroke="currentColor" stroke-width="1.5" />
      <circle cx="17" cy="15" r="1.5" fill="currentColor" />
    </svg>
    <span class="nav-item__label">Transactions</span>
    @if (rlaTxn.isActive) {
      <span class="nav-item__dot" aria-hidden="true"></span>
    }
  </a>

  <button
    class="nav-fab"
    (click)="onFabClick()"
    aria-label="Add new transaction"
    type="button"
  >
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M12 5V19M5 12H19"
        stroke="white"
        stroke-width="2.2"
        stroke-linecap="round"
      />
    </svg>
  </button>

  <a
    class="nav-item"
    routerLink="/budget"
    routerDirection="root"
    routerLinkActive="nav-item--active"
    [routerLinkActiveOptions]="{ exact: true }"
    [attr.aria-current]="rlaBudget.isActive ? 'page' : null"
    #rlaBudget="routerLinkActive"
    aria-label="Budget"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <path
        d="M3 3H10V10H3V3ZM14 3H21V10H14V3ZM3 14H10V21H3V14ZM14 14H21V21H14V14Z"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linejoin="round"
      />
    </svg>
    <span class="nav-item__label">Budget</span>
    @if (rlaBudget.isActive) {
      <span class="nav-item__dot" aria-hidden="true"></span>
    }
  </a>

  <a
    class="nav-item"
    routerLink="/settings"
    routerDirection="root"
    routerLinkActive="nav-item--active"
    [routerLinkActiveOptions]="{ exact: true }"
    [attr.aria-current]="rlaSettings.isActive ? 'page' : null"
    #rlaSettings="routerLinkActive"
    aria-label="Settings"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5" />
      <path
        d="M4 20C4 17 7.58 15 12 15C16.42 15 20 17 20 20"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
      />
    </svg>
    <span class="nav-item__label">Settings</span>
    @if (rlaSettings.isActive) {
      <span class="nav-item__dot" aria-hidden="true"></span>
    }
  </a>
</nav>
