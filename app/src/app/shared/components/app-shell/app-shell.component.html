<ion-header class="ion-no-border">
  <ion-toolbar>
    <div class="shell-toolbar__row">
      <div class="shell-toolbar__left">
        <ng-container *ngIf="greeting; else plainTitle">
          <p class="shell-toolbar__greeting-sub">{{ greetingPrefix }}</p>
          <p class="shell-toolbar__greeting-name">{{ greeting }}</p>
        </ng-container>

        <ng-template #plainTitle>
          <h1 class="shell-toolbar__title">{{ title }}</h1>
        </ng-template>
      </div>

      <div class="shell-toolbar__right">
        <ng-container *ngIf="showAvatar">
          <div class="shell-avatar-wrap">
            <div class="shell-avatar">{{ avatarInitials }}</div>
            <span
              *ngIf="hasNotification"
              class="shell-notif-dot"
              aria-label="You have notifications"
            ></span>
          </div>
        </ng-container>

        <ng-container *ngIf="action && action.variant === 'ghost'">
          <button
            class="shell-action-btn"
            (click)="actionClick.emit()"
            [attr.aria-label]="action.label"
          >
            <svg
              *ngIf="action.icon"
              viewBox="0 0 24 24"
              fill="none"
              aria-hidden="true"
            >
              <path
                [attr.d]="action.icon"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
            {{ action.label }}
          </button>
        </ng-container>

        <ng-container *ngIf="action && action.variant === 'icon-only'">
          <button
            class="shell-icon-btn"
            (click)="actionClick.emit()"
            [attr.aria-label]="action.label"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                [attr.d]="action.icon"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </ng-container>
      </div>
    </div>

    <ng-container *ngIf="subheaderTpl">
      <ng-container *ngTemplateOutlet="subheaderTpl"></ng-container>
    </ng-container>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="fullscreen" class="page-content">
  <ng-content></ng-content>
</ion-content>

<ion-footer class="shell-footer ion-no-border">
  <app-bottom-nav (fabTap)="openAddSheet()"></app-bottom-nav>
</ion-footer>

<app-add-transaction
  *ngIf="showAddSheet"
  (closed)="closeAddSheet()"
></app-add-transaction>
