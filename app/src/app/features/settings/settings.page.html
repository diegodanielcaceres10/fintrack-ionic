<app-shell title="Settings">
  <!-- ── Section: Sync mode ────────────────────────────────────────────────── -->
  <div class="section">
    <p class="section__label">Sync mode</p>

    <div class="card">
      <label
        class="radio-row"
        *ngFor="let opt of syncOptions; let last = last"
        [class.radio-row--selected]="selectedSyncMode === opt.value"
        [for]="'sync-' + opt.value"
      >
        <div class="radio-wrap">
          <input
            type="radio"
            name="syncMode"
            [id]="'sync-' + opt.value"
            [value]="opt.value"
            [checked]="selectedSyncMode === opt.value"
            (change)="setSyncMode(opt.value)"
            class="radio-input"
          />
          <span class="radio-circle">
            <span class="radio-circle__dot"></span>
          </span>
        </div>

        <div class="radio-text">
          <span class="radio-text__label">{{ opt.label }}</span>
          <span class="radio-text__sub">{{ opt.subtitle }}</span>
        </div>

        <span class="radio-row__divider" *ngIf="!last"></span>
      </label>
    </div>
  </div>

  <!-- ── Section: Sync status ──────────────────────────────────────────────── -->
  <div class="section">
    <p class="section__label">Sync status</p>

    <div class="card">
      <!-- Last synced row -->
      <div class="status-row">
        <div class="status-row__left">
          <span class="icon-wrap icon-wrap--bordered">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path
                d="M3.5 10A6.5 6.5 0 0 1 16 7.5M3.5 7.5A6.5 6.5 0 0 0 16 10"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
              />
              <path
                d="M14 5.5l2 2-2 2"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M6 10.5l-2 2 2 2"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <div class="status-row__text">
            <span class="status-row__name">Last synced</span>
            <span class="status-row__sub">{{ lastSyncLabel }}</span>
          </div>
        </div>
      </div>

      <div class="card__divider"></div>

      <!-- Pending records row -->
      <div class="status-row">
        <div class="status-row__left">
          <span class="icon-wrap icon-wrap--warning">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <circle
                cx="10"
                cy="10"
                r="7"
                stroke="currentColor"
                stroke-width="1.4"
              />
              <path
                d="M10 6.5v4M10 13h.01"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </span>
          <div class="status-row__text">
            <span class="status-row__name">Pending records</span>
            <span class="status-row__sub">Waiting to be uploaded</span>
          </div>
        </div>

        <!-- Badge via shared BadgeComponent -->
        <app-badge
          *ngIf="pendingRecords > 0"
          variant="warning"
          [label]="pendingRecords"
          [attr.aria-label]="pendingRecords + ' pending records'"
        />
        <app-badge
          *ngIf="pendingRecords === 0"
          variant="success"
          [check]="true"
          aria-label="No pending records"
        />
      </div>

      <div class="card__divider"></div>

      <!-- Sync now button — uses .btn-primary from design system -->
      <div class="sync-btn-wrap">
        <button
          class="btn-primary"
          [class]="syncBtnVariant"
          [disabled]="syncState === 'syncing'"
          (click)="syncNow()"
        >
          <span
            class="btn-primary__spinner"
            *ngIf="syncState === 'syncing'"
            aria-hidden="true"
          ></span>
          <svg
            *ngIf="syncState === 'success'"
            class="sync-check"
            viewBox="0 0 16 16"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M3 8l4 4 6-6"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          {{ syncBtnLabel }}
        </button>
      </div>
    </div>
  </div>

  <!-- ── Section: Account ──────────────────────────────────────────────────── -->
  <div class="section">
    <p class="section__label">Account</p>

    <div class="card">
      <!-- Email row -->
      <div class="account-row">
        <span class="icon-wrap icon-wrap--accent">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle
              cx="10"
              cy="7"
              r="3"
              stroke="currentColor"
              stroke-width="1.4"
            />
            <path
              d="M3 17c0-3 3.13-5 7-5s7 2 7 5"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
            />
          </svg>
        </span>
        <div class="account-row__text">
          <span class="account-row__label">Signed in as</span>
          <span class="account-row__email">{{ userEmail }}</span>
        </div>
      </div>

      <div class="card__divider"></div>

      <!-- Logout row -->
      <button
        class="logout-row"
        (click)="logout()"
        aria-label="Log out of your account"
      >
        <span class="icon-wrap icon-wrap--danger">
          <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path
              d="M7 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h3"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
            />
            <path
              d="M13 14l3-4-3-4M16 10H8"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>
        <span class="logout-row__label">Log out</span>
        <svg
          class="logout-row__chevron"
          viewBox="0 0 20 20"
          fill="none"
          aria-hidden="true"
        >
          <path
            d="M7.5 5l5 5-5 5"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
  </div>

  <!-- App version -->
  <p class="app-version">Kora · v1.0.0</p>
</app-shell>
