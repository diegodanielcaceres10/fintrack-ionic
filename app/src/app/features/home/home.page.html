<app-shell greeting="Alex Johnson" avatarInitials="AJ" [hasNotification]="true">
  <!-- ── Metric cards ──────────────────────────────────────────────────────── -->
  <section class="metrics">
    <div class="metric-card metric-card--accent">
      <p class="metric-card__label">Total balance</p>
      <p class="metric-card__value">{{ formatBalance(balance) }}</p>
      <p class="metric-card__change metric-card__change--up">
        +2.4% this month
      </p>
    </div>

    <div class="metric-card">
      <p class="metric-card__label">Monthly spend</p>
      <p class="metric-card__value">{{ formatBalance(monthlySpend) }}</p>
      <p class="metric-card__change metric-card__change--down">+8.1% vs last</p>
    </div>
  </section>

  <!-- ── Spending donut ────────────────────────────────────────────────────── -->
  <h2 class="section-title">Spending by category</h2>

  <div class="chart-card">
    <div class="chart-card__inner">
      <div class="donut-wrap">
        <canvas
          #donutCanvas
          width="130"
          height="130"
          role="img"
          aria-label="Spending by category: Housing 35%, Food 22%, Transport 18%, Entertainment 14%, Health 11%"
        ></canvas>
        <div class="donut-center">
          <span class="donut-center__label">total</span>
          <span class="donut-center__value"
            >{{ formatBalance(monthlySpend) }}</span
          >
        </div>
      </div>

      <ul class="legend">
        <li class="legend__item" *ngFor="let cat of categories">
          <span class="legend__dot" [style.background]="cat.color"></span>
          <span class="legend__name">{{ cat.name }}</span>
          <span class="legend__pct">{{ cat.percentage }}%</span>
        </li>
      </ul>
    </div>
  </div>

  <!-- ── Recent transactions ───────────────────────────────────────────────── -->
  <h2 class="section-title">Recent transactions</h2>

  <ul class="txn-list">
    <li *ngFor="let txn of transactions">
      <app-list-row
        [icon]="iconFor(txn)"
        [iconBg]="iconBgFor(txn)"
        [name]="txn.name"
        [sub]="formattedDate(txn)"
        [amount]="formatAmount(txn.amount)"
        [amountVariant]="amountVariant(txn.amount)"
      />
    </li>
  </ul>
</app-shell>
