<ion-header class="ion-no-border">
  <ion-toolbar>
    <!-- Title row -->
    <div class="toolbar__title-row">
      <h1 class="toolbar__title">Transactions</h1>
      <button class="toolbar__icon-btn" aria-label="Filter options">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M3 6h18M7 12h10M11 18h2"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>

    <!-- Search bar -->
    <div class="search-bar">
      <svg
        class="search-bar__icon"
        viewBox="0 0 24 24"
        fill="none"
        aria-hidden="true"
      >
        <circle cx="11" cy="11" r="7" stroke="#9B99B8" stroke-width="1.5" />
        <path
          d="M16.5 16.5L21 21"
          stroke="#9B99B8"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
      <input
        class="search-bar__input"
        type="search"
        placeholder="Search transactions…"
        [(ngModel)]="searchQuery"
        aria-label="Search transactions"
      />
      <button
        class="search-bar__clear"
        *ngIf="searchQuery"
        (click)="searchQuery = ''"
        aria-label="Clear search"
      >
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M18 6L6 18M6 6l12 12"
            stroke="#9B99B8"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>

    <!-- Month filter -->
    <div class="month-strip" role="listbox" aria-label="Filter by month">
      <button
        class="month-strip__item"
        *ngFor="let m of months; let i = index"
        [class.month-strip__item--active]="selectedMonth === i"
        (click)="setMonth(i)"
        role="option"
        [attr.aria-selected]="selectedMonth === i"
      >
        {{ m }}
      </button>
    </div>

    <!-- Filter pills -->
    <div class="filter-pills" role="group" aria-label="Transaction type filter">
      <button
        class="pill"
        [class.pill--active]="activeFilter === 'all'"
        (click)="setFilter('all')"
      >
        All
      </button>
      <button
        class="pill"
        [class.pill--active]="activeFilter === 'expenses'"
        (click)="setFilter('expenses')"
      >
        Expenses
      </button>
      <button
        class="pill"
        [class.pill--active]="activeFilter === 'income'"
        (click)="setFilter('income')"
      >
        Income
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="txn-content">
  <!-- Empty state -->
  <div class="empty-state" *ngIf="groups.length === 0">
    <span class="empty-state__icon">🔍</span>
    <p class="empty-state__title">No transactions found</p>
    <p class="empty-state__sub">Try a different search or filter</p>
  </div>

  <!-- Transaction groups -->
  <div class="txn-group" *ngFor="let group of groups; trackBy: trackByGroup">
    <!-- Day header -->
    <div class="day-header">
      <span class="day-header__label">{{ group.label }}</span>
      <span class="day-header__line"></span>
      <span
        class="day-header__total"
        [class.day-header__total--pos]="group.items | groupTotal | positiveTotal"
      >
        {{ group.items | groupTotal | formatGroupTotal }}
      </span>
    </div>

    <!-- Rows -->
    <ul class="txn-list">
      <li class="txn-row" *ngFor="let txn of group.items; trackBy: trackByTxn">
        <!-- Icon -->
        <div
          class="txn-row__icon"
          [style.background]="categoryMeta[txn.category].bg"
        >
          {{ categoryMeta[txn.category].icon }}
        </div>

        <!-- Meta -->
        <div class="txn-row__meta">
          <p class="txn-row__name">{{ txn.name }}</p>
          <span
            class="txn-row__category-pill"
            [style.background]="categoryMeta[txn.category].bg"
            [style.color]="categoryMeta[txn.category].color"
            >{{ categoryMeta[txn.category].label }}</span
          >
        </div>

        <!-- Right side -->
        <div class="txn-row__right">
          <span
            class="txn-row__amount"
            [class.txn-row__amount--neg]="txn.amount < 0"
            [class.txn-row__amount--pos]="txn.amount > 0"
            >{{ formatAmount(txn.amount) }}</span
          >
          <span
            class="txn-row__sync"
            [class.txn-row__sync--synced]="txn.syncStatus === 'synced'"
            [class.txn-row__sync--pending]="txn.syncStatus === 'pending'"
            [attr.aria-label]="txn.syncStatus === 'synced' ? 'Synced' : 'Pending sync'"
          >
            <!-- Checkmark -->
            <svg
              *ngIf="txn.syncStatus === 'synced'"
              viewBox="0 0 12 12"
              fill="none"
              aria-hidden="true"
            >
              <path
                d="M2 6l3 3 5-5"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <!-- Dot -->
            <span
              *ngIf="txn.syncStatus === 'pending'"
              class="txn-row__sync-dot"
            ></span>
          </span>
        </div>
      </li>
    </ul>
  </div>

  <div class="bottom-spacer"></div>
</ion-content>

<!-- Bottom navigation -->
<div class="bottom-nav">
  <button
    class="nav-item"
    [class.nav-item--active]="activeTab === 'home'"
    (click)="setTab('home')"
    aria-label="Home"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <path
        d="M3 9.5L12 3L21 9.5V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9.5Z"
        fill="currentColor"
      />
    </svg>
    <span class="nav-item__label">Home</span>
  </button>

  <button
    class="nav-item nav-item--active"
    [class.nav-item--active]="activeTab === 'cards'"
    (click)="setTab('cards')"
    aria-label="Cards"
    aria-current="page"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <rect
        x="3"
        y="6"
        width="18"
        height="13"
        rx="2"
        stroke="currentColor"
        stroke-width="1.5"
      />
      <path d="M3 10H21" stroke="currentColor" stroke-width="1.5" />
      <circle cx="17" cy="15" r="1.5" fill="currentColor" />
    </svg>
    <span class="nav-item__label">Cards</span>
    <span class="nav-item__dot"></span>
  </button>

  <button class="nav-fab" aria-label="New transaction">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M12 5V19M5 12H19"
        stroke="white"
        stroke-width="2.2"
        stroke-linecap="round"
      />
    </svg>
  </button>

  <button
    class="nav-item"
    [class.nav-item--active]="activeTab === 'analytics'"
    (click)="setTab('analytics')"
    aria-label="Analytics"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <path
        d="M3 3H10V10H3V3ZM14 3H21V10H14V3ZM3 14H10V21H3V14ZM14 14H21V21H14V14Z"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linejoin="round"
      />
    </svg>
    <span class="nav-item__label">Analytics</span>
  </button>

  <button
    class="nav-item"
    [class.nav-item--active]="activeTab === 'profile'"
    (click)="setTab('profile')"
    aria-label="Profile"
  >
    <svg
      class="nav-item__icon"
      viewBox="0 0 24 24"
      fill="none"
      aria-hidden="true"
    >
      <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5" />
      <path
        d="M4 20C4 17 7.58 15 12 15C16.42 15 20 17 20 20"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
      />
    </svg>
    <span class="nav-item__label">Profile</span>
  </button>
</div>
